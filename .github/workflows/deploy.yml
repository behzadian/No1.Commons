name: Deploy NuGet Package

on:
  push:
    branches: [ main,"v1.1.0" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
    - uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json

    - name: Restore dependencies
      run: dotnet restore

    - name: Check code style
      run: dotnet format --verify-no-changes --verbosity diagnostic --severity error

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Test
      run: dotnet test

    - name: Pack
      run: dotnet pack -c Release --no-build --output ./artifacts

    # - name: Publish to GitHub Packages
    #   run: |
    #     dotnet nuget push ./artifacts/*.nupkg \
    #       --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
    #       --api-key ${{ secrets.GITHUB_TOKEN }}
    
    - name: NuGet push
      run: dotnet nuget push artifacts/No1.Commons.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
