name: Deploy NuGet Package

on:
  push:
    branches: [ main,"v1.1.0" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      id-token: write

    steps:
    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: Farayan
    
    - uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json

    - name: Restore dependencies
      run: dotnet restore

    - name: Check code style
      run: dotnet format --verify-no-changes --verbosity diagnostic --severity error

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Test
      run: dotnet test

    - name: Pack
      run: dotnet pack -c Release --no-build --output ./artifacts

    - name: Check if version already published
      run: |
        # Extract version from package
        PKG_VERSION=$(ls ./artifacts/*.nupkg | sed -E 's/.*\.([0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?)\.nupkg/\1/' | head -1)
        PKG_NAME="No1.Commons"
        
        echo "Checking version: $PKG_VERSION for package: $PKG_NAME"
        
        # Check nuget.org
        NUGET_RESPONSE=$(curl -s "https://api.nuget.org/v3-flatcontainer/$PKG_NAME/index.json")
        if echo "$NUGET_RESPONSE" | jq -e ".versions[] | select(. == \"$PKG_VERSION\")" > /dev/null 2>&1; then
          echo "ERROR: Version $PKG_VERSION already exists on nuget.org"
          exit 1
        fi
        
        # Check GitHub Packages
        GITHUB_RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://nuget.pkg.github.com/${{ github.repository_owner }}/query?q=$PKG_NAME&prerelease=true")
        if echo "$GITHUB_RESPONSE" | jq -e ".data[0].versions[] | select(.version == \"$PKG_VERSION\")" > /dev/null 2>&1; then
          echo "ERROR: Version $PKG_VERSION already exists on GitHub Packages"
          exit 1
        fi
        
        echo "✓ Version $PKG_VERSION not found on either registry"

    - name: Deploy to GitHub
      run: |
        dotnet nuget push ./artifacts/*.nupkg \
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
          --api-key ${{ secrets.GITHUB_TOKEN }}
    
    #- name: Deploy to NuGet.org
    #  run: ls ./artifacts && dotnet nuget push ./artifacts/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
